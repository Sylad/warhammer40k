name: warhammer40k

# Mode "image-only" : les sources ne sont plus sur le NAS.
# Pipeline build : `./scripts/build-deploy.sh [backend|frontend|all]`
# (depuis WSL — tar le context et stream via SSH au daemon Docker du NAS).
# Le compose ne fait que tirer les images locales taggées :latest.

services:
  warhammer-backend:
    image: warhammer40k-backend:latest
    ports:
      - "3001:3001"
    env_file: /volume2/docker/developpeur/warhammer40k/.env
    environment:
      NODE_ENV: production
      PORT: "3001"
      CORS_ORIGIN: "http://nas:4201"
      IMAGES_DIR: /app/images
      SHARED_DATA_DIR: /app/shared-data
    volumes:
      - "/volume2/photo/Jeux/Warhammer 40K:/app/images:ro"
      - /volume2/docker/developpeur/data/warhammer:/app/data
      - /volume2/docker/developpeur/data/shared:/app/shared-data
    restart: unless-stopped

  warhammer-frontend:
    image: warhammer40k-frontend:latest
    ports:
      - "4201:80"
    depends_on:
      - warhammer-backend
    restart: unless-stopped
