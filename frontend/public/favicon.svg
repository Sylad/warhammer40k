<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d276"/>
      <stop offset="50%" stop-color="#c9a24a"/>
      <stop offset="100%" stop-color="#80652b"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7b1113" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
  </defs>

  <!-- Dark grimdark background with red center -->
  <rect width="100" height="100" rx="14" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect x="3" y="3" width="94" height="94" rx="12" fill="none" stroke="url(#gold)" stroke-width="3"/>

  <!-- Stylized Aquila (twin-headed eagle) — simplified silhouette -->
  <g fill="url(#gold)" stroke="#80652b" stroke-width="0.4" stroke-linejoin="round">
    <!-- Left wing -->
    <path d="M 50 30 L 28 26 L 18 32 L 14 42 L 22 40 L 18 50 L 28 48 L 24 58 L 36 54 L 50 52 Z"/>
    <!-- Right wing (mirror) -->
    <path d="M 50 30 L 72 26 L 82 32 L 86 42 L 78 40 L 82 50 L 72 48 L 76 58 L 64 54 L 50 52 Z"/>
    <!-- Left head -->
    <path d="M 50 32 L 44 24 L 40 22 L 38 26 L 42 28 L 40 32 L 44 34 L 50 34 Z"/>
    <!-- Right head -->
    <path d="M 50 32 L 56 24 L 60 22 L 62 26 L 58 28 L 60 32 L 56 34 L 50 34 Z"/>
    <!-- Body / shield -->
    <path d="M 50 50 L 45 60 L 47 72 L 50 80 L 53 72 L 55 60 Z"/>
  </g>

  <!-- "40K" text below -->
  <text x="50" y="92" font-family="Georgia, serif" font-size="11" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="1">40,000</text>
</svg>
